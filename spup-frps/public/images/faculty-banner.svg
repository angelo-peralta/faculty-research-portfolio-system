<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 640" role="img" aria-labelledby="title desc">
  <title id="title">Faculty profile banner</title>
  <desc id="desc">Green banner with repeating gold fleur-de-lis pattern.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a6a34"/>
      <stop offset="28%" stop-color="#0a6a34"/>
      <stop offset="100%" stop-color="#00763a"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a6a34" stop-opacity="1"/>
      <stop offset="18%" stop-color="#0a6a34" stop-opacity="0.92"/>
      <stop offset="42%" stop-color="#0a6a34" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a6a34" stop-opacity="0"/>
    </linearGradient>
    <symbol id="fleur" viewBox="0 0 64 64">
      <path
        fill="currentColor"
        d="M32 3c2 5 8 10 8 17 0 5-2 9-5 12 4-1 9-4 11-10 4 2 6 7 6 11 0 10-8 15-17 15l3 13h-5l-1-8-1 8h-5l3-13C20 48 12 43 12 33c0-4 2-9 6-11 2 6 7 9 11 10-3-3-5-7-5-12 0-7 6-12 8-17Zm-8 30c-4 0-7 2-9 5 3 1 7 3 11 2l2-6c-1-1-3-1-4-1Zm16 0c-1 0-3 0-4 1l2 6c4 1 8-1 11-2-2-3-5-5-9-5Z"
      />
    </symbol>
    <pattern id="pattern" width="140" height="128" patternUnits="userSpaceOnUse">
      <g color="#f0c419" opacity="0.88">
        <use href="#fleur" x="14" y="10" width="54" height="54" />
        <use href="#fleur" x="84" y="74" width="54" height="54" />
      </g>
      <g color="#7ea12b" opacity="0.55">
        <use href="#fleur" x="84" y="10" width="54" height="54" />
        <use href="#fleur" x="14" y="74" width="54" height="54" />
      </g>
    </pattern>
  </defs>

  <rect width="2048" height="640" fill="url(#bg)" />
  <rect x="560" width="1488" height="640" fill="url(#pattern)" />
  <rect width="900" height="640" fill="url(#fade)" />
</svg>
